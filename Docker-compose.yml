version: '3.8'
services:
  backend:
    build: ./back_end_portfolio
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
    networks:
      - portfolio-network

  frontend:
    build: ./frontend_portfolio
    ports:
      - "5173:80" # Port Vite par défaut
    depends_on:
      - backend
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
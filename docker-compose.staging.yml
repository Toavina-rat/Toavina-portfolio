version: '3.8'

services:
  backend:
    image: ${DOCKER_REGISTRY}/${CI_PROJECT_PATH}/backend:latest
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=staging
    networks:
      - portfolio-network

  frontend:
    image: ${DOCKER_REGISTRY}/${CI_PROJECT_PATH}/frontend:latest
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge